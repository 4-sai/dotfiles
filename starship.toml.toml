# ============================================================
#  ~/.config/starship.toml — Starship prompt config
#  Install: curl -sS https://starship.rs/install.sh | sh
# ============================================================

format = """
[┌─](bold #585b70)\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$aws\
$terraform\
$docker_context\
$python\
$golang\
$nodejs\
$rust\
$cmd_duration\
$line_break\
[└─](bold #585b70)\
$character"""

palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo  = "#f2cdcd"
pink      = "#f5c2e7"
mauve     = "#cba6f7"
red       = "#f38ba8"
maroon    = "#eba0ac"
peach     = "#fab387"
yellow    = "#f9e2af"
green     = "#a6e3a1"
teal      = "#94e2d5"
sky       = "#89dceb"
sapphire  = "#74c7ec"
blue      = "#89b4fa"
lavender  = "#b4befe"
text      = "#cdd6f4"
subtext1  = "#bac2de"
subtext0  = "#a6adc8"
overlay2  = "#9399b2"
overlay1  = "#7f849c"
overlay0  = "#6c7086"
surface2  = "#585b70"
surface1  = "#45475a"
surface0  = "#313244"
base      = "#1e1e2e"
mantle    = "#181825"
crust     = "#11111b"

[username]
style_user  = "bold mauve"
style_root  = "bold red"
format      = "[$user]($style) "
show_always = false  # only show when SSH or root

[hostname]
ssh_only  = true
format    = "on [$hostname](bold sapphire) "
style     = "bold sapphire"

[directory]
style             = "bold blue"
format            = "in [$path]($style)[$read_only]($read_only_style) "
truncation_length = 4
truncation_symbol = "…/"
read_only         = " 󰌾"

[git_branch]
symbol = " "
style  = "bold mauve"
format = "on [$symbol$branch]($style) "

[git_status]
format    = "([$all_status$ahead_behind]($style) )"
style     = "bold yellow"
conflicted = "⚡"
ahead      = "⇡${count}"
behind     = "⇣${count}"
diverged   = "⇕⇡${ahead_count}⇣${behind_count}"
untracked  = "?${count}"
stashed    = "󰏗 ${count}"
modified   = "!${count}"
staged     = "+${count}"
deleted    = "✘${count}"

[kubernetes]
symbol  = "󱃾 "
style   = "bold sky"
format  = "[$symbol$context( \\($namespace\\))]($style) "
disabled = false

[aws]
symbol = "󰅟 "
style  = "bold peach"
format = "[$symbol($profile )(\\($region\\) )]($style)"

[terraform]
symbol = "󱁢 "
style  = "bold mauve"
format = "[$symbol$workspace]($style) "

[docker_context]
symbol  = " "
style   = "bold sapphire"
format  = "[$symbol$context]($style) "

[python]
symbol = " "
style  = "bold yellow"
format = "[$symbol($virtualenv )]($style)"

[golang]
symbol = " "
style  = "bold teal"
format = "[$symbol($version )]($style)"

[nodejs]
symbol = " "
style  = "bold green"
format = "[$symbol($version )]($style)"

[rust]
symbol = "󱘗 "
style  = "bold peach"
format = "[$symbol($version )]($style)"

[cmd_duration]
min_time  = 2000
style     = "bold yellow"
format    = "took [$duration]($style) "

[character]
success_symbol = "[❯](bold green)"
error_symbol   = "[❯](bold red)"
vimcmd_symbol  = "[❮](bold mauve)"

[time]
disabled  = false
style     = "bold overlay0"
format    = "at [$time]($style) "
time_format = "%H:%M"
