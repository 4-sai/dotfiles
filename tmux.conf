# ============================================================
#  ~/.tmux.conf — DevOps / Red Team tmux config
#  Install TPM first:
#  git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#  Then: prefix + I to install plugins
# ============================================================

# ── Prefix ───────────────────────────────────────────────────
unbind C-b
set -g prefix C-a          # Ctrl+A is more ergonomic
bind C-a send-prefix

# ── Core Settings ────────────────────────────────────────────
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"
set -g base-index 1             # windows start at 1
setw -g pane-base-index 1       # panes start at 1
set -g renumber-windows on      # auto-renumber on close
set -g history-limit 50000
set -g display-time 2000
set -g focus-events on
set -sg escape-time 0           # no delay for escape key (crucial for nvim)
set -g mouse on                 # mouse support
setw -g aggressive-resize on

# ── Key Bindings ─────────────────────────────────────────────
# Reload config
bind r source-file ~/.tmux.conf \; display-message "✅ Config reloaded"

# Better splits (stay in current dir)
bind "|" split-window -h -c "#{pane_current_path}"
bind "-" split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# New window in current dir
bind c new-window -c "#{pane_current_path}"

# Vim-style pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes with Vim keys (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Swap windows
bind -r "<" swap-window -d -t -1
bind -r ">" swap-window -d -t +1

# Quick window navigation
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5

# Copy mode (vim)
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-pipe-and-cancel "xclip -sel clip"
bind -T copy-mode-vi C-v send -X rectangle-toggle

# Session management
bind S command-prompt -p "New session:" "new-session -s '%%'"
bind K confirm-before -p "Kill session #S? (y/n)" "kill-session"

# ── Layouts (useful for DevOps) ──────────────────────────────
# Quick: 3-pane ops layout — editor | logs | shell
bind M-d \
  split-window -h -p 35 \; \
  split-window -v -p 40 \; \
  select-pane -t 1

# Quick: monitoring layout
bind M-m \
  new-window \; \
  send-keys "btop" Enter \; \
  split-window -h \; \
  send-keys "watch -n2 kubectl get pods 2>/dev/null || echo 'no k8s'" Enter

# ── Status Bar ───────────────────────────────────────────────
set -g status on
set -g status-interval 5
set -g status-position bottom
set -g status-justify left

# Colors (catppuccin mocha inspired)
CRUST="#1e1e2e"
MANTLE="#181825"
BASE="#1e1e2e"
TEXT="#cdd6f4"
SUBTEXT="#a6adc8"
LAVENDER="#b4befe"
BLUE="#89b4fa"
GREEN="#a6e3a1"
RED="#f38ba8"
YELLOW="#f9e2af"
PEACH="#fab387"
MAUVE="#cba6f7"

set -g status-style "bg=$CRUST,fg=$TEXT"
set -g status-left-length 60
set -g status-right-length 120

set -g status-left \
  "#[bg=$MAUVE,fg=$CRUST,bold] #S #[bg=$CRUST,fg=$MAUVE]"

set -g status-right \
  "#[fg=$SUBTEXT] %d %b  %H:%M #[fg=$BLUE] #{pane_current_path} #[bg=$BLUE,fg=$CRUST,bold]  #H "

# Window tabs
setw -g window-status-format " #I:#W#{?window_zoomed_flag, 🔍,} "
setw -g window-status-current-format \
  "#[bg=$BLUE,fg=$CRUST,bold] #I:#W#{?window_zoomed_flag, 🔍,} "
setw -g window-status-style "fg=$SUBTEXT"

# Pane borders
set -g pane-border-style "fg=$MANTLE"
set -g pane-active-border-style "fg=$BLUE"

# Messages
set -g message-style "bg=$YELLOW,fg=$CRUST,bold"

# ── Plugins ──────────────────────────────────────────────────
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # save/restore sessions
set -g @plugin 'tmux-plugins/tmux-continuum'   # auto-save
set -g @plugin 'tmux-plugins/tmux-yank'        # clipboard
set -g @plugin 'sainnhe/tmux-fzf'              # fzf integration
set -g @plugin 'wfxr/tmux-fzf-url'            # open urls with fzf

# Plugin settings
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '10'

run '~/.tmux/plugins/tpm/tpm'
