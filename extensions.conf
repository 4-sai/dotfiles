# =============================================================================
# GNOME SHELL EXTENSIONS CONFIG
# =============================================================================
# Captured with: dconf dump /org/gnome/shell/extensions/
# Restore with:  dconf load /org/gnome/shell/extensions/ < gnome-extensions.conf
#
# FULL RESTORE STEPS (new system):
#
#   1. Install extensions (via https://extensions.gnome.org or gext CLI):
#        pip install gnome-extensions-cli
#        gext install forge@jmmaranan.com
#        gext install just-perfection-desktop@just-perfection
#        gext install space-bar@luchrioh
#        gext install switcher@landau.fi
#        gext install tactile@lundal.io
#        gext install tiling-assistant@leleat-on-github
#        gext install tophat@fflewddur.github.io
#        gext install ding@rastersoft.com
#
#   2. Load this config:
#        dconf load /org/gnome/shell/extensions/ < gnome-extensions.conf
#
#   3. Restart GNOME Shell:
#        X11   → Alt+F2, type r, press Enter
#        Wayland → Log out and back in
#
# TO UPDATE this file from your current machine:
#        dconf dump /org/gnome/shell/extensions/ > gnome-extensions.conf
#
# NOTE: Run dconf load as your regular user, never with sudo.
#       Settings are user-scoped.
# =============================================================================


# =============================================================================
# DING — Desktop Icons NG
# -----------------------------------------------------------------------------
# Renders icons on the GNOME desktop (files, drives, trash).
# check-x11wayland: ensures compatibility when running X11 apps under Wayland.
# =============================================================================

[ding]
check-x11wayland=true


# =============================================================================
# FORGE — Tiling Window Manager
# -----------------------------------------------------------------------------
# Keyboard-driven tiling WM inside GNOME. Supports splits, stacking,
# tabbed layouts, floating windows, and vim-style focus/move navigation.
#
# LAYOUT TOGGLES
#   Super + Z               Split horizontal
#   Super + V               Split vertical
#   Super + G               Cycle split layout
#   Shift + Super + S       Stacked layout
#   Shift + Super + T       Tabbed layout
#   Super + W               Toggle tiling on/off
#   Shift + Super + W       Toggle tiling for active workspace
#   Super + X               Toggle focus border
#   Ctrl + Alt + Y          Toggle tab decoration
#
# WINDOW FOCUS  (vim keys)
#   Super + H / J / K / L  Focus left / down / up / right
#
# WINDOW MOVE
#   Shift + Super + H/J/K/L     Move window left / down / up / right
#
# WINDOW SWAP
#   Ctrl + Super + H/J/K/L      Swap with neighbour left/down/up/right
#   Super + Return              Swap with last active window
#
# WINDOW RESIZE
#   Ctrl + Super + U            Increase top edge
#   Ctrl + Super + I            Increase bottom edge
#   Ctrl + Super + O            Increase right edge
#   Ctrl + Super + Y            Increase left edge
#   Shift + Ctrl + Super + U    Decrease top edge
#   Shift + Ctrl + Super + I    Decrease bottom edge
#   Shift + Ctrl + Super + O    Decrease right edge
#   Shift + Ctrl + Super + Y    Decrease left edge
#   Ctrl + Super + Plus         Increase gap size
#   Ctrl + Super + Minus        Decrease gap size
#
# FLOAT
#   Super + C                   Toggle float
#   Shift + Super + C           Always float
#
# WINDOW SNAP
#   Ctrl + Alt + C              Snap to center
#   Ctrl + Alt + D              Snap to left 1/3
#   Ctrl + Alt + G              Snap to right 1/3
#   Ctrl + Alt + E              Snap to left 2/3
#   Ctrl + Alt + T              Snap to right 2/3
# =============================================================================

[forge]
css-last-update=uint32 37

[forge/keybindings]
con-split-horizontal=['<Super>z']
con-split-layout-toggle=['<Super>g']
con-split-vertical=['<Super>v']
con-stacked-layout-toggle=['<Shift><Super>s']
con-tabbed-layout-toggle=['<Shift><Super>t']
con-tabbed-showtab-decoration-toggle=['<Control><Alt>y']
focus-border-toggle=['<Super>x']
prefs-tiling-toggle=['<Super>w']
window-focus-down=['<Super>j']
window-focus-left=['<Super>h']
window-focus-right=['<Super>l']
window-focus-up=['<Super>k']
window-gap-size-decrease=['<Control><Super>minus']
window-gap-size-increase=['<Control><Super>plus']
window-move-down=['<Shift><Super>j']
window-move-left=['<Shift><Super>h']
window-move-right=['<Shift><Super>l']
window-move-up=['<Shift><Super>k']
window-resize-bottom-decrease=['<Shift><Control><Super>i']
window-resize-bottom-increase=['<Control><Super>u']
window-resize-left-decrease=['<Shift><Control><Super>o']
window-resize-left-increase=['<Control><Super>y']
window-resize-right-decrease=['<Shift><Control><Super>y']
window-resize-right-increase=['<Control><Super>o']
window-resize-top-decrease=['<Shift><Control><Super>u']
window-resize-top-increase=['<Control><Super>i']
window-snap-center=['<Control><Alt>c']
window-snap-one-third-left=['<Control><Alt>d']
window-snap-one-third-right=['<Control><Alt>g']
window-snap-two-third-left=['<Control><Alt>e']
window-snap-two-third-right=['<Control><Alt>t']
window-swap-down=['<Control><Super>j']
window-swap-last-active=['<Super>Return']
window-swap-left=['<Control><Super>h']
window-swap-right=['<Control><Super>l']
window-swap-up=['<Control><Super>k']
window-toggle-always-float=['<Shift><Super>c']
window-toggle-float=['<Super>c']
workspace-active-tile-toggle=['<Shift><Super>w']


# =============================================================================
# JUST PERFECTION — GNOME Shell UI Tweaks
# -----------------------------------------------------------------------------
# Fine-grained control over which GNOME Shell UI elements are visible.
# All elements below are set to visible (true). Disable any by setting false
# and reloading this config.
#
# Controlled elements:
#   panel                   Top bar
#   dash                    App dock
#   dash-separator          Separator line in dock
#   dash-app-running        Running app indicator dots
#   activities-button       Activities button (top-left)
#   search                  Search bar in overview
#   show-apps-button        Grid icon in dock
#   workspace               Workspace switcher in overview
#   clock-menu              Clock/calendar in top bar
#   calendar                Calendar in clock menu
#   quick-settings          Quick settings panel (bottom-right of top bar)
#   quick-settings-dark-mode  Dark mode toggle in quick settings
#   quick-settings-backlight  Brightness slider in quick settings
#   accessibility-menu      Accessibility menu in top bar
#   osd                     On-screen display (volume/brightness popups)
#   window-preview-close-button  X button on window thumbnails in overview
# =============================================================================

[just-perfection]
accessibility-menu=true
activities-button=true
calendar=true
clock-menu=true
dash=true
dash-app-running=true
dash-separator=true
osd=true
panel=true
quick-settings=true
quick-settings-backlight=true
quick-settings-dark-mode=true
search=true
show-apps-button=true
support-notifier-showed-version=36
support-notifier-type=0
window-preview-close-button=true
workspace=true


# =============================================================================
# SPACE BAR — Workspace Indicator
# -----------------------------------------------------------------------------
# Replaces the default workspace dots with labelled pills in the top bar.
# Custom CSS is applied for active, inactive, and empty workspace states.
#
# Active workspace:   white pill background, bold white text
# Inactive workspace: transparent background, bold white text
# Empty workspace:    transparent background, 50% opacity white text
#
# Workspace keyboard shortcuts are disabled here — managed elsewhere
# (e.g. via GNOME Settings > Keyboard > Workspaces).
# =============================================================================

[space-bar/appearance]
application-styles='.space-bar {\n  -natural-hpadding: 12px;\n}\n\n.space-bar-workspace-label.active {\n  margin: 0 4px;\n  background-color: rgba(255,255,255,0.3);\n  color: rgba(255,255,255,1);\n  border-color: rgba(0,0,0,0);\n  font-weight: 700;\n  border-radius: 4px;\n  border-width: 0px;\n  padding: 3px 8px;\n}\n\n.space-bar-workspace-label.inactive {\n  margin: 0 4px;\n  background-color: rgba(0,0,0,0);\n  color: rgba(255,255,255,1);\n  border-color: rgba(0,0,0,0);\n  font-weight: 700;\n  border-radius: 4px;\n  border-width: 0px;\n  padding: 3px 8px;\n}\n\n.space-bar-workspace-label.inactive.empty {\n  margin: 0 4px;\n  background-color: rgba(0,0,0,0);\n  color: rgba(255,255,255,0.5);\n  border-color: rgba(0,0,0,0);\n  font-weight: 700;\n  border-radius: 4px;\n  border-width: 0px;\n  padding: 3px 8px;\n}'

[space-bar/shortcuts]
enable-activate-workspace-shortcuts=false

[space-bar/state]
version=34


# =============================================================================
# SWITCHER — App / Window Switcher
# -----------------------------------------------------------------------------
# Overlay switcher triggered by a custom shortcut (replaces Alt+Tab style).
#
# SHORTCUT
#   Ctrl + Space            Open switcher
#
# DISPLAY SETTINGS
#   Font size:    22px
#   Icon size:    25px
#   Max width:    46% of screen width
#   Fade animation: enabled
#   Multi-monitor: shows on the display with the active window only
# =============================================================================

[switcher]
fade-enable=true
font-size=uint32 22
icon-size=uint32 25
max-width-percentage=uint32 46
on-active-display=false
show-switcher=['<Control>space']


# =============================================================================
# TACTILE — Keyboard Zone Tiling
# -----------------------------------------------------------------------------
# Divides the screen into a grid of named zones. Windows snap to zones
# via keyboard. row-2=0 disables the second row of zones (single-row layout).
# Debug mode is off.
# =============================================================================

[tactile]
debug=false
row-2=0


# =============================================================================
# TILING ASSISTANT — Enhanced Window Tiling
# -----------------------------------------------------------------------------
# Adds a visual tile-picker popup when dragging windows to screen edges,
# and overrides GNOME's built-in edge-tiling so Forge/Tiling Assistant
# handles all tiling behaviour instead.
#
# active-window-hint-color: orange highlight on the focused tiled window
# tiling-popup-all-workspace: popup shows tiles from all workspaces
#
# Overridden GNOME settings (restored automatically on uninstall):
#   org.gnome.mutter.edge-tiling
#   org.gnome.mutter.keybindings.toggle-tiled-left
#   org.gnome.mutter.keybindings.toggle-tiled-right
# =============================================================================

[tiling-assistant]
active-window-hint-color='rgb(211,70,21)'
last-version-installed=46
overridden-settings={'org.gnome.mutter.edge-tiling': <@mb nothing>, 'org.gnome.mutter.keybindings.toggle-tiled-left': <@mb nothing>, 'org.gnome.mutter.keybindings.toggle-tiled-right': <@mb nothing>}
tiling-popup-all-workspace=true


# =============================================================================
# TOPHAT — System Resource Monitor
# -----------------------------------------------------------------------------
# Displays system stats in the top bar. Configured to show CPU and memory
# only. Disk, filesystem, and network meters are hidden.
#
# mount-to-monitor: tracks the root partition (/) for disk usage
# show-disk:  false — disk I/O meter hidden
# show-fs:    false — filesystem usage meter hidden
# show-net:   false — network meter hidden
# =============================================================================

[tophat]
mount-to-monitor='/'
show-disk=false
show-fs=false
show-net=false
